<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="project_slide_styles.css"> 
    <link rel="stylesheet" href="contact_slide_styles.css"> 

    <title>David Kipnis</title>

    <script src="displays.js"></script>
</head>

<body>
    <div class="container">
        <div class="slide" id="Intro">
            <div class="slide_container">
                <h1 id="intro_text" class="header_text"></h1>
                <ul id="directory">
                    <li>
                        <a href="#Projects" class="list_item">Projects</a>
                    </li>
                    <li>
                        <a href="#Contact" class="list_item">Contact</a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="slide" id="Projects">
            <div class="row">
                <div class="column">
                    <a href="https://thedavidkipnis.github.io/game-of-life/">
                        <img src="assets/vikingbot.png" alt="vikingbot" class="projects_image">
                    </a>
                </div>
                <div class="column">
                    <img src="assets/JTA.png" alt="jta" class="projects_image">
                </div>
                <div class="column">
                    <img src="assets/TASQ.png" alt="tasq" class="projects_image">
                </div>
            </div>
        </div>
        <div class="slide" id="Contact">
            <div class="slide_container">
                <ul id="contact_directory">
                    <li>
                        <a href="#Projects" class="list_item">Projects</a>
                    </li>
                    <li>
                        <a href="#Contact" class="list_item">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
